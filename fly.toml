# Fly.io config for the crypto-backtest auto-trader.
#
# Quick start (one-time, on your laptop):
#   curl -L https://fly.io/install.sh | sh
#   fly auth login
#   fly launch --no-deploy --copy-config       # picks up this fly.toml
#   fly volume create trader_data --size 1     # 1 GB persistent disk
#   fly secrets set \
#       BINANCE_API_KEY=...  BINANCE_API_SECRET=...
#   fly deploy
#
# Open the dashboard from your laptop (no public exposure):
#   fly proxy 8501 -a crypto-backtest          # then http://localhost:8501
#
# Logs:
#   fly logs                                   # live tail
#   fly ssh console -C 'tail -f /var/log/trader.log'
#
# Change strategy / symbol / leverage:
#   edit the trader process command below → `fly deploy`

app = "crypto-backtest"           # CHANGE ME — must be globally unique on Fly.
primary_region = "fra"            # Frankfurt. See `fly platform regions`.

# -----------------------------------------------------------------------------
# Build: use the Dockerfile in the repo root.
# -----------------------------------------------------------------------------
[build]
  dockerfile = "Dockerfile"

# -----------------------------------------------------------------------------
# Processes: one machine per process. Both default to the smallest VM (~$2-3/mo
# each at 24/7 usage). Comment out `app` if you only want the trader.
# -----------------------------------------------------------------------------
[processes]
  # The 24/7 trader. Edit the args to change market / symbol / strategy /
  # sizing. Dry-run is on by default; add `--live` to submit real orders.
  trader = "python -u trade.py --market futures --symbol BTC/USDT --tf 1h --strategy 'ROC Momentum' --params '{\"n\":20,\"thr\":0.0}' --notional-pct 5 --leverage 20 --allow-short"

  # The Streamlit dashboard. Bind to 0.0.0.0 so Fly's internal proxy can reach
  # it, but DON'T expose it publicly — see the [[services]] block below.
  app = "streamlit run app.py --server.address 0.0.0.0 --server.port 8501 --server.headless true --browser.gatherUsageStats false"

# -----------------------------------------------------------------------------
# Default VM size. shared-cpu-1x @ 256MB is enough for the trader; bump to
# 512MB for Streamlit if you keep the dashboard process.
# -----------------------------------------------------------------------------
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["trader", "app"]

# -----------------------------------------------------------------------------
# Persistent storage. Trader writes logs here, and saved API keys + the
# scheduler's saved trader records will live here across deploys / restarts.
# Mounted as /data so we can symlink /var/log → /data/log and the key store
# (~/.crypto-backtest) → /data/keys (see [env] below).
# -----------------------------------------------------------------------------
[mounts]
  source = "trader_data"
  destination = "/data"
  processes = ["trader", "app"]

[env]
  TZ = "UTC"
  # Tell the Streamlit app and trader where to persist state on the volume.
  HOME = "/data"             # so ~/.crypto-backtest → /data/.crypto-backtest
  TRADER_LOG_DIR = "/data/log"

# -----------------------------------------------------------------------------
# Public networking — INTENTIONALLY NONE.
#
# The dashboard is reached via `fly proxy 8501` (a local-only WireGuard tunnel)
# so there is no public URL exposing your API-key UI. If you want a public
# https URL with basic-auth, add a [[services]] block here — but think hard
# before doing so.
# -----------------------------------------------------------------------------

# Don't auto-stop machines (the trader must run 24/7 to honour bar closes).
[deploy]
  strategy = "immediate"
