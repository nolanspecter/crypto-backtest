# ─────────────────────────────────────────────────────────────────────────────
#  crypto-backtest — per-machine configuration
# ─────────────────────────────────────────────────────────────────────────────
#  Anyone cloning the repo edits THIS file (and only this file) to pick their
#  defaults. Nothing here is a secret — API keys are NEVER stored in this file
#  and never committed to git. Keys come from the Streamlit "Start trading"
#  form or from BINANCE_API_KEY / BINANCE_API_SECRET environment variables.
#
#  The values below are loaded by config.py and used as the starting point
#  for sidebar widgets, the trade form, and the scanner. Every value can still
#  be overridden in the UI at run-time — these are just the defaults.
# ─────────────────────────────────────────────────────────────────────────────


# ─── Streamlit app defaults ──────────────────────────────────────────────────
[app]
title        = "📈 Crypto 4H Backtester"
page_icon    = "📈"

# Market: "spot" or "futures" (USDⓂ perpetuals).
market       = "futures"

# Quote currency for the universe (ignored on futures — Binance USDⓂ is USDT).
quote        = "USDT"

# How many top-by-market-cap coins to load into the picker.
universe_size = 100

# Default timeframe for the sidebar selectbox.
timeframe    = "1h"

# Default backtest window in days (used to seed the date-range pickers).
lookback_days = 365


# ─── Single-strategy mode defaults ──────────────────────────────────────────
[single_strategy]
# Symbol pre-selected when the app opens. Must match a Binance trading pair.
default_symbol = "BTC/USDT"

# Strategy pre-selected. Must match one of the keys in strategies.STRATEGIES.
default_strategy = "ROC Momentum"


# ─── Tournament-mode defaults ───────────────────────────────────────────────
[tournament]
# Number of symbols pre-checked in the multiselect when entering Find-best mode.
default_n_symbols = 5

# Metric used to rank strategies in the leaderboard.
rank_metric = "Total Return"


# ─── Live trader defaults (Start-trading form) ──────────────────────────────
#  These prefill the form fields when the user clicks "🚀 Start trading".
#  The form still requires explicit confirmation and accepts overrides for
#  every field. --live is OFF by default; the user must tick it to send real
#  orders.
[trader]
market         = "futures"
symbol         = "BTC/USDT"
timeframe      = "1h"
strategy       = "ROC Momentum"

# Per-strategy params merged with the strategy's own defaults. Anything not
# listed here falls back to the value in strategies.STRATEGIES[<name>].params.
strategy_params = { n = 20, thr = 0.0 }

# Notional per trade as % of free USDT (re-evaluated from local capital
# snapshot on each entry in dry-run; from live balance in live mode).
notional_pct   = 5.0

# Futures only. Notional = margin × leverage on futures; ignored on spot.
leverage       = 20.0

# Shorting permitted by indicators that support it.
allow_short    = true

# Seconds after a bar's close to wait before fetching, so the exchange has
# finalised the bar. 5s is plenty for Binance.
bar_buffer_seconds = 5


# ─── Filesystem paths ───────────────────────────────────────────────────────
[paths]
# Where the trader subprocess writes its log files. /tmp is fine for local
# laptops; on a VPS prefer something like "/var/log/trader" (writable by
# the user running streamlit).
log_dir = "/tmp"

# Where the optional "Remember keys on this machine" feature persists API
# keys (mode 0600). Override if you want a different location. The default
# is ~/.crypto-backtest/binance.json (handled by config.py).
key_store = "~/.crypto-backtest/binance.json"


# ─── Auto-refresh defaults for the live-trader status panel ─────────────────
[ui]
# One of: "Off", "1s", "3s", "5s", "10s"
default_auto_refresh = "3s"

# Number of log lines tailed into the status panel.
log_tail_lines = 300
